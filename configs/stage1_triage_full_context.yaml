# Stage 1 — Triage-full context ablation
#
# Full KTAS adjudication-sequence supervision. The model generates
# (age group, chief-complaint category, subcategory, clinical modifier, level)
# as a comma-separated sequence after the [KTAS sequence] delimiter.
# Reproduces the "Triage-full context" row in Tables I and IV of the paper.

mode:
  target_format: full_sequence    # 'full_sequence' generates the entire adjudication tuple
  use_classification_head: false  # generation only (no auxiliary classification head)
  use_classification_only: false

model:
  backbone: mistralai/Ministral-8B-Instruct-2410
  quantization: 4bit
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  compute_dtype: bfloat16
  attn_implementation: flash_attention_2

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules: all_linear

data:
  max_seq_length: 2048
  val_split_ratio: 0.01

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  # Effective batch = 4 x 8 x 4 GPUs = 128
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  optimizer: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
