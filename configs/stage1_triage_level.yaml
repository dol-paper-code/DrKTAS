# Stage 1 — Triage-level ablation
#
# Final-level-only generation. The model is supervised to generate only the
# KTAS triage level (single digit 1-5) after the [KTAS sequence] delimiter.
# Reproduces the "Triage-level" row in Tables I and IV of the paper.

mode:
  target_format: level            # 'level' generates only the final digit
  use_classification_head: false  # generation only
  use_classification_only: false

model:
  backbone: mistralai/Ministral-8B-Instruct-2410
  quantization: 4bit              # NF4 with double quantization
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true
  compute_dtype: bfloat16
  attn_implementation: flash_attention_2

lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules: all_linear      # all attention + FFN projections

data:
  max_seq_length: 2048
  val_split_ratio: 0.01

training:
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8
  # Effective batch = 4 (per device) x 8 (accum) x 4 (GPUs) = 128
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  optimizer: adamw_torch
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
